name: Build TouchBlocker APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 构建 Debug 版本（两个 flavor 都会构建）
      - name: Build Debug APKs
        run: ./gradlew :app:assembleDebug --stacktrace

      # 上传 Internal Debug（通常体积更小，推荐测试用）
      - name: Upload Internal Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchBlocker-internal-debug
          path: app/build/outputs/apk/internal/debug/app-internal-debug.apk
          if-no-files-found: error

      # 上传 Production Debug
      - name: Upload Production Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchBlocker-production-debug
          path: app/build/outputs/apk/production/debug/app-production-debug.apk
          if-no-files-found: error

      # （可选）构建未签名的 Release 版本
      - name: Build Release APKs
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload Production Release (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: TouchBlocker-production-release-unsigned
          path: app/build/outputs/apk/production/release/app-production-release.apk
          if-no-files-found: warn