name: Build TouchBlocker APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 清理 + 构建 Debug APK
      - name: Build Debug APK
        run: ./gradlew :featureunlocker:assembleDebug --stacktrace

      # 构建 Release APK（未签名）
      - name: Build Release APK
        run: ./gradlew :featureunlocker:assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchBlocker-debug
          path: featureunlocker/build/outputs/apk/debug/featureunlocker-debug.apk
          if-no-files-found: error

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchBlocker-release
          path: featureunlocker/build/outputs/apk/release/featureunlocker-release.apk
          if-no-files-found: error