name: Build TouchBlocker APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:     # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 构建 Debug 版本（强烈推荐先用这个测试安装）
      - name: Build Debug APK
        run: ./gradlew :featureunlocker:assembleDebug --stacktrace

      # 构建 Release APK（未签名，仅用于测试）
      - name: Build Release APK
        run: ./gradlew :featureunlocker:assembleRelease --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: TouchBlocker-debug
          path: featureunlocker/build/outputs/apk/debug/featureunlocker-debug.apk
          if-no-files-found: error

      - name: Upload Release APK (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: TouchBlocker-release-unsigned
          path: featureunlocker/build/outputs/apk/release/featureunlocker-release.apk
          if-no-files-found: error