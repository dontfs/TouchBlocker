name: Build TouchBlocker APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 构建所有 Debug 版本
      - name: Build All Debug APKs
        run: ./gradlew :app:assembleDebug --stacktrace

      # 列出所有生成的 APK 文件，帮助我们看清楚实际路径和文件名
      - name: List generated APK files
        run: find app/build/outputs/apk -name "*.apk" | head -20 || echo "No APK found"

      # 自动上传所有生成的 Debug APK
      - name: Upload All Debug APKs
        uses: actions/upload-artifact@v4
        with:
          name: TouchBlocker-debug-apks
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      # （可选）构建 Release 版本
      - name: Build All Release APKs
        run: ./gradlew :app:assembleRelease --stacktrace

      - name: Upload All Release APKs (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: TouchBlocker-release-unsigned
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: warn